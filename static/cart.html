<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 · 마켓프레시</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site">
    <div class="header-row">
      <a class="logo" href="/" data-testid="logo">마켓프레시</a>
      <input class="search" id="site-search" data-testid="search"
             placeholder="검색어를 입력해주세요" aria-label="상품 검색" />
      <span class="auth" id="auth-area" data-testid="auth-area"></span>
      <a class="cart-link" href="/cart" data-testid="cart-link" aria-label="장바구니">
        🛒<span class="cart-count hidden" id="cart-count" data-testid="cart-count">0</span>
      </a>
    </div>
    <nav class="cats" id="cat-nav" data-testid="cat-nav" aria-label="카테고리"></nav>
  </header>

  <main>
    <h1 class="section-title" style="margin-top:0">장바구니</h1>

    <div class="loading" id="loading" data-testid="loading">
      <span class="spinner" aria-hidden="true"></span> 불러오는 중…
    </div>

    <div class="empty hidden" id="empty" data-testid="cart-empty">
      <p>장바구니가 비어있습니다.</p>
      <a class="btn btn-outline" href="/" style="display:inline-block;margin-top:1rem">쇼핑 계속하기</a>
    </div>

    <section id="cart-body" class="hidden" data-testid="cart-body">
      <div id="items"></div>

      <div class="summary" data-testid="summary">
        <div class="line"><span>상품금액</span><span data-testid="subtotal" id="subtotal"></span></div>
        <div class="line">
          <span>배송비</span><span data-testid="shipping" id="shipping"></span>
        </div>
        <p class="ship-note hidden" id="ship-note" data-testid="ship-note"></p>
        <div class="line total"><span>결제예정금액</span><span data-testid="total" id="total"></span></div>
      </div>

      <button class="btn btn-primary" id="checkout" data-testid="checkout"
              style="width:100%;margin-top:1.25rem;padding:1rem">주문하기</button>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script>
    function itemHTML(it) {
      return `
        <div class="cart-item" data-testid="cart-item" data-id="${it.id}">
          <div class="ci-thumb" style="background:${it.color}"><span aria-hidden="true">${it.emoji}</span></div>
          <div>
            <a class="ci-name" href="/product/${it.id}" data-testid="item-name">${it.name}</a>
            <div class="ci-unit">${it.unit} · ${won(it.price)}</div>
            <div class="stepper" style="margin-top:.5rem" data-testid="item-stepper">
              <button data-act="dec" data-id="${it.id}" data-testid="item-minus" aria-label="수량 감소" ${it.qty <= 1 ? "disabled" : ""}>−</button>
              <span class="qty" data-testid="item-qty">${it.qty}</span>
              <button data-act="inc" data-id="${it.id}" data-testid="item-plus" aria-label="수량 증가">+</button>
            </div>
          </div>
          <div class="ci-line" data-testid="item-line">${won(it.line_total)}</div>
          <button class="ci-remove" data-act="remove" data-id="${it.id}" data-testid="item-remove" aria-label="삭제">✕</button>
        </div>`;
    }

    async function render() {
      const res = await fetch("/api/cart");
      const data = await res.json();
      document.querySelector("#loading").classList.add("hidden");

      const empty = data.items.length === 0;
      document.querySelector("#empty").classList.toggle("hidden", !empty);
      document.querySelector("#cart-body").classList.toggle("hidden", empty);
      if (empty) { refreshCartCount(); return; }

      document.querySelector("#items").innerHTML = data.items.map(itemHTML).join("");
      document.querySelector("#subtotal").textContent = won(data.subtotal);
      document.querySelector("#shipping").textContent =
        data.shipping === 0 ? "무료" : won(data.shipping);
      document.querySelector("#total").textContent = won(data.total);

      const note = document.querySelector("#ship-note");
      const remain = data.free_shipping_threshold - data.subtotal;
      if (data.shipping > 0 && remain > 0) {
        note.textContent = `${won(remain)} 더 담으면 무료배송!`;
        note.classList.remove("hidden");
      } else {
        note.classList.add("hidden");
      }
      refreshCartCount();
    }

    // 이벤트 위임 (수량 변경 / 삭제)
    document.querySelector("#items").addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const id = Number(btn.dataset.id);
      const act = btn.dataset.act;
      const qtyEl = btn.parentElement?.querySelector(".qty");
      const current = qtyEl ? Number(qtyEl.textContent) : 1;

      if (act === "remove") {
        await fetch(`/api/cart/${id}`, { method: "DELETE" });
      } else {
        const next = act === "inc" ? current + 1 : current - 1;
        if (next < 1) return;
        await fetch(`/api/cart/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ qty: next }),
        });
      }
      render();
    });

    document.querySelector("#checkout").addEventListener("click", () => {
      window.location.href = "/order";   // 주문서로 이동 (회원/비회원 모두)
    });

    initHeader();
    render();
  </script>
</body>
</html>
