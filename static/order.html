<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문서 · 마켓프레시</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site">
    <div class="header-row">
      <a class="logo" href="/" data-testid="logo">마켓프레시</a>
      <input class="search" id="site-search" data-testid="search"
             placeholder="검색어를 입력해주세요" aria-label="상품 검색" />
      <span class="auth" id="auth-area" data-testid="auth-area"></span>
      <a class="cart-link" href="/cart" data-testid="cart-link" aria-label="장바구니">
        🛒<span class="cart-count hidden" id="cart-count" data-testid="cart-count">0</span>
      </a>
    </div>
    <nav class="cats" id="cat-nav" data-testid="cat-nav" aria-label="카테고리"></nav>
  </header>

  <main>
    <h1 class="order-title">주문서</h1>

    <div class="loading" id="loading" data-testid="loading">
      <span class="spinner" aria-hidden="true"></span> 불러오는 중…
    </div>

    <div class="empty hidden" id="empty" data-testid="order-empty">
      <p>주문할 상품이 없습니다.</p>
      <a class="btn btn-outline" href="/" style="display:inline-block;margin-top:1rem">쇼핑하러 가기</a>
    </div>

    <div id="order-body" class="order-layout hidden" data-testid="order-body">
      <div class="order-main">
        <!-- 주문자 정보 -->
        <section class="order-card">
          <h2 class="order-card-title">주문자 정보</h2>
          <div class="field">
            <label for="orderer-name">이름</label>
            <input type="text" id="orderer-name" data-testid="orderer-name" autocomplete="name" />
            <p class="error" id="orderer-name-error" data-testid="orderer-name-error" role="alert"></p>
          </div>
          <div class="field">
            <label for="orderer-phone">연락처</label>
            <input type="text" id="orderer-phone" data-testid="orderer-phone" inputmode="numeric"
                   placeholder="숫자만 입력" autocomplete="tel" />
            <p class="error" id="orderer-phone-error" data-testid="orderer-phone-error" role="alert"></p>
          </div>
          <div class="field">
            <label for="orderer-email">이메일</label>
            <input type="email" id="orderer-email" data-testid="orderer-email"
                   placeholder="example@marketfresh.com" autocomplete="email" />
            <p class="error" id="orderer-email-error" data-testid="orderer-email-error" role="alert"></p>
          </div>
        </section>

        <!-- 배송지 정보 -->
        <section class="order-card">
          <h2 class="order-card-title">배송지 정보</h2>
          <div class="field">
            <label for="recipient">받는 사람</label>
            <input type="text" id="recipient" data-testid="order-recipient" autocomplete="name" />
            <p class="error" id="recipient-error" data-testid="recipient-error" role="alert"></p>
          </div>
          <div class="field">
            <label for="phone">연락처</label>
            <input type="text" id="phone" data-testid="order-phone" inputmode="numeric"
                   placeholder="숫자만 입력" autocomplete="tel" />
            <p class="error" id="phone-error" data-testid="phone-error" role="alert"></p>
          </div>
          <div class="field">
            <label for="address">주소</label>
            <input type="text" id="address" data-testid="order-address" autocomplete="street-address" />
            <p class="error" id="address-error" data-testid="address-error" role="alert"></p>
          </div>
          <div class="field">
            <label for="request">배송 요청사항 <span class="field-optional">선택</span></label>
            <input type="text" id="request" data-testid="order-request" placeholder="예: 문 앞에 놓아주세요" />
          </div>
        </section>

        <!-- 주문 상품 -->
        <section class="order-card">
          <h2 class="order-card-title">주문 상품</h2>
          <div id="order-items" data-testid="order-items"></div>
        </section>

        <!-- 결제수단 -->
        <section class="order-card">
          <h2 class="order-card-title">결제수단</h2>
          <div class="pay-methods" role="radiogroup" aria-label="결제수단">
            <label class="pay-option">
              <input type="radio" name="pay" value="card" data-testid="pay-card" checked />
              <span>신용카드</span>
            </label>
            <label class="pay-option">
              <input type="radio" name="pay" value="bank" data-testid="pay-bank" />
              <span>무통장입금</span>
            </label>
            <label class="pay-option">
              <input type="radio" name="pay" value="easy" data-testid="pay-easy" />
              <span>간편결제</span>
            </label>
          </div>
        </section>

        <!-- 결제 금액 정보 -->
        <section class="order-card">
          <h2 class="order-card-title">결제 금액</h2>
          <div class="summary" data-testid="order-summary">
            <div class="line"><span>상품금액</span><span data-testid="order-subtotal" id="subtotal"></span></div>
            <div class="line"><span>상품할인</span><span class="discount-amount" data-testid="order-discount" id="discount"></span></div>
            <div class="line"><span>배송비</span><span data-testid="order-shipping" id="shipping"></span></div>
            <div class="line total"><span>최종 결제 금액</span><span data-testid="order-total" id="total"></span></div>
          </div>

          <button class="btn btn-primary place-order-btn" id="place-order" data-testid="place-order">
            결제하기
          </button>
        </section>
      </div>
    </div>
  </main>

  <script src="/static/common.js"></script>
  <script>
    function itemHTML(it) {
      const hasDiscount = it.original_price && it.original_price > it.price;
      const priceHTML = hasDiscount
        ? `<span class="oi-original">${won(it.original_price)}</span>
           <span class="oi-price">${won(it.price)}</span>`
        : `<span class="oi-price">${won(it.price)}</span>`;
      return `
        <div class="order-item" data-testid="order-item">
          <div class="ci-thumb" style="background:${it.color}"><span aria-hidden="true">${it.emoji}</span></div>
          <div class="ci-info">
            <div class="ci-name">${it.name}</div>
            <div class="ci-unit">${it.unit} · ${it.qty}개</div>
            <div class="oi-prices" data-testid="order-item-price">${priceHTML}</div>
          </div>
          <div class="ci-line">${won(it.line_total)}</div>
        </div>`;
    }

    async function load() {
      // 주문서 진입 시 체크아웃 정보를 한 번에 받아옴 (상품/금액/할인/배송비/결제수단)
      const res = await fetch("/api/checkout");
      const data = await res.json();
      document.querySelector("#loading").classList.add("hidden");

      if (data.items.length === 0) {
        document.querySelector("#empty").classList.remove("hidden");
        return;
      }

      document.querySelector("#order-body").classList.remove("hidden");
      document.querySelector("#order-items").innerHTML = data.items.map(itemHTML).join("");
      // 금액은 백엔드가 계산해서 내려준 값을 그대로 표시
      document.querySelector("#subtotal").textContent = won(data.subtotal);
      document.querySelector("#discount").textContent =
        data.discount_total > 0 ? `-${won(data.discount_total)}` : won(0);
      document.querySelector("#shipping").textContent =
        data.shipping === 0 ? "무료" : won(data.shipping);
      document.querySelector("#total").textContent = won(data.total);
    }

    function validate() {
      let ok = true;
      const checks = [
        ["#orderer-name", "#orderer-name-error"],
        ["#orderer-phone", "#orderer-phone-error"],
        ["#orderer-email", "#orderer-email-error"],
        ["#recipient", "#recipient-error"],
        ["#phone", "#phone-error"],
        ["#address", "#address-error"],
      ];
      for (const [input, err] of checks) {
        const empty = !document.querySelector(input).value.trim();
        document.querySelector(err).textContent = empty ? "필수 입력 항목입니다." : "";
        if (empty) ok = false;
      }
      const email = document.querySelector("#orderer-email").value.trim();
      if (email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        document.querySelector("#orderer-email-error").textContent = "이메일 형식이 올바르지 않습니다.";
        ok = false;
      }
      return ok;
    }

    document.querySelector("#place-order").addEventListener("click", async () => {
      if (!validate()) return;
      const payment = document.querySelector('input[name="pay"]:checked').value;
      const res = await fetch("/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          orderer_name: document.querySelector("#orderer-name").value.trim(),
          orderer_phone: document.querySelector("#orderer-phone").value.trim(),
          orderer_email: document.querySelector("#orderer-email").value.trim(),
          recipient_name: document.querySelector("#recipient").value.trim(),
          phone: document.querySelector("#phone").value.trim(),
          address: document.querySelector("#address").value.trim(),
          delivery_request: document.querySelector("#request").value.trim(),
          payment_method: payment,
        }),
      });
      if (res.status === 201) {
        const order = await res.json();
        window.location.href = `/order/complete/${order.order_id}`;
      } else {
        toast("주문에 실패했습니다.", "err");
      }
    });

    initHeader();
    load();
  </script>
</body>
</html>
