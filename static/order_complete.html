<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 완료 · 마켓프레시</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site">
    <div class="header-row">
      <a class="logo" href="/" data-testid="logo">마켓프레시</a>
      <input class="search" id="site-search" data-testid="search"
             placeholder="검색어를 입력해주세요" aria-label="상품 검색" />
      <span class="auth" id="auth-area" data-testid="auth-area"></span>
      <a class="cart-link" href="/cart" data-testid="cart-link" aria-label="장바구니">
        🛒<span class="cart-count hidden" id="cart-count" data-testid="cart-count">0</span>
      </a>
    </div>
    <nav class="cats" id="cat-nav" data-testid="cat-nav" aria-label="카테고리"></nav>
  </header>

  <main>
    <div class="loading" id="loading" data-testid="loading">
      <span class="spinner" aria-hidden="true"></span> 불러오는 중…
    </div>

    <p class="empty hidden" id="not-found" data-testid="not-found">
      주문 정보를 찾을 수 없습니다. <a href="/" style="color:var(--purple)">홈으로</a>
    </p>

    <section class="complete hidden" id="complete" data-testid="order-complete">
      <div class="complete-hero">
        <div class="check" aria-hidden="true">✓</div>
        <h1>주문이 완료되었습니다</h1>
        <p class="order-no">주문번호 <b data-testid="complete-order-no" id="order-no"></b></p>
      </div>

      <h2 class="order-heading">주문 상품</h2>
      <div id="items" data-testid="complete-items"></div>

      <div class="summary">
        <div class="line"><span>상품금액</span><span id="subtotal"></span></div>
        <div class="line"><span>배송비</span><span id="shipping"></span></div>
        <div class="line total"><span>결제금액</span><span data-testid="complete-total" id="total"></span></div>
      </div>

      <h2 class="order-heading">주문자 정보</h2>
      <div class="deliver-box" data-testid="complete-orderer">
        <div><b id="c-orderer-name"></b></div>
        <div id="c-orderer-phone" class="ci-unit"></div>
        <div id="c-orderer-email" class="ci-unit"></div>
      </div>

      <h2 class="order-heading">배송지</h2>
      <div class="deliver-box" data-testid="complete-delivery">
        <div><b id="c-recipient"></b></div>
        <div id="c-phone" class="ci-unit"></div>
        <div id="c-address" class="ci-unit"></div>
      </div>

      <div class="complete-actions">
        <a class="btn btn-outline" href="/mypage/orders" data-testid="view-orders">주문 내역 보기</a>
        <a class="btn btn-primary" href="/" data-testid="continue-shopping">쇼핑 계속하기</a>
      </div>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script>
    const orderId = location.pathname.split("/").filter(Boolean)[2];  // /order/complete/{id}

    function itemHTML(it) {
      return `
        <div class="order-item" data-testid="complete-item">
          <div class="ci-thumb" style="background:${it.color}"><span aria-hidden="true">${it.emoji}</span></div>
          <div class="ci-info"><div class="ci-name">${it.name}</div><div class="ci-unit">${it.unit} · ${it.qty}개</div></div>
          <div class="ci-line">${won(it.line_total)}</div>
        </div>`;
    }

    async function load() {
      const res = await fetch(`/api/orders/${orderId}`);
      document.querySelector("#loading").classList.add("hidden");
      if (res.status === 404) {
        document.querySelector("#not-found").classList.remove("hidden");
        return;
      }
      const o = await res.json();
      document.querySelector("#order-no").textContent = o.order_no;
      document.querySelector("#items").innerHTML = o.items.map(itemHTML).join("");
      document.querySelector("#subtotal").textContent = won(o.subtotal);
      document.querySelector("#shipping").textContent = o.shipping === 0 ? "무료" : won(o.shipping);
      document.querySelector("#total").textContent = won(o.total);
      document.querySelector("#c-orderer-name").textContent = o.orderer_name || "-";
      document.querySelector("#c-orderer-phone").textContent = o.orderer_phone || "-";
      document.querySelector("#c-orderer-email").textContent = o.orderer_email || "-";
      document.querySelector("#c-recipient").textContent = o.recipient_name;
      document.querySelector("#c-phone").textContent = o.phone;
      document.querySelector("#c-address").textContent = o.address;
      document.querySelector("#complete").classList.remove("hidden");
    }

    initHeader();
    load();
  </script>
</body>
</html>
