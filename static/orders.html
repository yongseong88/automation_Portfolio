<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 내역 · 마켓프레시</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site">
    <div class="header-row">
      <a class="logo" href="/" data-testid="logo">마켓프레시</a>
      <input class="search" id="site-search" data-testid="search"
             placeholder="검색어를 입력해주세요" aria-label="상품 검색" />
      <span class="auth" id="auth-area" data-testid="auth-area"></span>
      <a class="cart-link" href="/cart" data-testid="cart-link" aria-label="장바구니">
        🛒<span class="cart-count hidden" id="cart-count" data-testid="cart-count">0</span>
      </a>
    </div>
    <nav class="cats" id="cat-nav" data-testid="cat-nav" aria-label="카테고리"></nav>
  </header>

  <main>
    <p class="breadcrumb" data-testid="breadcrumb"><a href="/mypage">마이페이지</a> › 주문 내역</p>
    <h1 class="section-title" style="margin-top:0">주문 내역</h1>

    <div class="loading" id="loading" data-testid="loading">
      <span class="spinner" aria-hidden="true"></span> 불러오는 중…
    </div>

    <div class="empty hidden" id="empty" data-testid="orders-empty">
      <p>주문 내역이 없습니다.</p>
      <a class="btn btn-outline" href="/" style="display:inline-block;margin-top:1rem">쇼핑하러 가기</a>
    </div>

    <div id="orders" class="hidden" data-testid="orders-page"></div>
  </main>

  <script src="/static/common.js"></script>
  <script>
    function summaryText(items) {
      if (items.length === 0) return "";
      const first = items[0].name;
      return items.length > 1 ? `${first} 외 ${items.length - 1}건` : first;
    }

    function orderHTML(o) {
      return `
        <a class="order-row" href="/order/complete/${o.order_id}" data-testid="order-row" data-order-id="${o.order_id}">
          <div>
            <div class="order-row-no"><b data-testid="order-no">${o.order_no}</b>
              <span class="badge-status" data-testid="order-status">${o.status}</span></div>
            <div class="ci-unit" data-testid="order-date">${o.created_at.slice(0, 10)}</div>
            <div class="ci-name" style="margin-top:.3rem">${summaryText(o.items)}</div>
          </div>
          <div class="ci-line" data-testid="order-total">${won(o.total)}</div>
        </a>`;
    }

    async function load() {
      const res = await fetch("/api/orders");
      if (res.status === 401) {
        window.location.href = "/login?next=/mypage/orders";  // 로그인 필요
        return;
      }
      const data = await res.json();
      document.querySelector("#loading").classList.add("hidden");

      if (data.count === 0) {
        document.querySelector("#empty").classList.remove("hidden");
        return;
      }
      const wrap = document.querySelector("#orders");
      wrap.innerHTML = data.items.map(orderHTML).join("");
      wrap.classList.remove("hidden");
    }

    initHeader();
    load();
  </script>
</body>
</html>
